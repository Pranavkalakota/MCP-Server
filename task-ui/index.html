<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Server Integration Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #5e17eb;
            --primary: #a78bfa;
            --text: #f0f0f5;
            --low: #34d399;
            --medium: #fbbf24;
            --high: #f87171;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 40px 0;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a78bfa, #5e17eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        input,
        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #6d28d9;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.4s;
        }

        .task-item:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .priority-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .prio-low {
            background: rgba(52, 211, 153, 0.1);
            color: var(--low);
        }

        .prio-medium {
            background: rgba(251, 191, 36, 0.1);
            color: var(--medium);
        }

        .prio-high {
            background: rgba(248, 113, 113, 0.1);
            color: var(--high);
        }

        .task-meta {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
            display: flex;
            gap: 15px;
        }

        .chat-message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            max-width: 85%;
        }

        .user-message {
            background: rgba(94, 23, 235, 0.1);
            border-left: 3px solid var(--accent);
            margin-left: auto;
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>MCP Server Integration</h1>
            <p style="color: #666">Task Management Dashboard</p>
        </header>


        <div id="taskList" class="task-list">
            <!-- Tasks will appear here -->
        </div>

        <div class="card" style="margin-top: 30px;">
            <h3 style="margin-top: 0; margin-bottom: 20px; font-weight: 400; color: #a78bfa;">💬 Conversational
                Assistant</h3>
            <div id="chatOutput"
                style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; min-height: 80px; max-height: 200px; overflow-y: auto; margin-bottom: 15px; font-size: 0.95rem; color: #ccc;">
                <em>Hello! I am your conversational agent. Tell me to "add a high priority task to finish homework",
                    "show tasks", or "delete task 2".</em>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chatInput" placeholder="Message the assistant..." style="flex-grow: 1"
                    onkeypress="handleChatPress(event)">
                <button onclick="sendChatMessage()" style="background: #a78bfa; color: #0a0a0c;">SEND</button>
            </div>
        </div>

    </div>

    <script>
        const API = 'http://localhost:3000';

        // Chat functionality
        let lastAssistantMessage = "";

        function appendChat(text, isUser = false) {
            const chatOutput = document.getElementById('chatOutput');
            const msg = document.createElement('div');
            msg.className = `chat-message ${isUser ? 'user-message' : 'bot-message'}`;
            msg.innerHTML = `
                <div style="font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">
                    ${isUser ? 'User' : 'Assistant'}
                </div>
                <div>${text}</div>
            `;
            chatOutput.appendChild(msg);
            chatOutput.scrollTop = chatOutput.scrollHeight;
            if (!isUser) lastAssistantMessage = text;
        }

        async function sendChatMessage() {
            const inputField = document.getElementById('chatInput');
            const text = inputField.value.trim();
            if (!text) return;

            appendChat(text, true);
            inputField.value = '';

            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, lastResponse: lastAssistantMessage })
                });
                const data = await res.json();
                appendChat(data.response);
                loadTasks(); // Always reload tasks after a chat action
            } catch (e) {
                appendChat("Failed to reach server.");
            }
        }

        function handleChatPress(e) {
            if (e.key === 'Enter') sendChatMessage();
        }

        async function loadTasks() {
            try {
                const res = await fetch(`${API}/tasks`);
                const tasks = await res.json();
                const list = document.getElementById('taskList');

                // Tasks are sorted by ID ASC to keep visual index predictable (1 is first, 2 is second)
                list.innerHTML = tasks.sort((a, b) => a.id - b.id).map((t, i) => `
                    <div class="task-item">
                        <div style="flex-grow: 1">
                            <div style="font-weight: 600; font-size: 1.1rem">
                                <span style="color: var(--primary); font-size: 1rem; font-weight: 800; margin-right: 12px;">${i + 1}.</span>
                                ${t.title}
                                <span style="color: #999; font-size: 0.7rem; margin-left: 8px; font-weight: 400;">(ID: ${t.id})</span>
                            </div>
                            <div class="task-meta">
                                Due: ${t.due_date || 'No date'} • Created: ${t.created_at.split(' ')[0]}
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span class="priority-badge prio-${t.priority}">${t.priority}</span>
                            <button onclick="deleteTask(${t.id})" style="background: none; border: 1px solid rgba(248, 113, 113, 0.3); color: var(--high); padding: 5px 10px; font-size: 0.8rem;">✕</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Link to offline database failed.", e);
            }
        }


        async function deleteTask(id) {
            if (!confirm(`Delete task #${id}?`)) return;
            await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
            loadTasks();
        }



        loadTasks();
    </script>
</body>

</html>
